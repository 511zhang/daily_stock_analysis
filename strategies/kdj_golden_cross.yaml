# KDJ Golden Cross Strategy / KDJ 金叉
# K line crosses above D line from oversold territory (J < 20).

name: kdj_golden_cross
display_name: KDJ金叉
description: KDJ 指标低位金叉，K 线上穿 D 线，J 值从低位回升，捕捉短线反转机会。
category: reversal
core_rules: [1, 4, 6]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [KDJ金叉, kdj金叉, KD金叉]
default_priority: 45
market_regimes: [sideways, trending_down]

instructions: |
  **KDJ 金叉（KDJ Golden Cross Strategy）**

  计算方式（基于 get_daily_history，9日参数）：
  - RSV = (今日收盘 - 9日最低) / (9日最高 - 9日最低) × 100
  - K = 2/3 × 昨日K + 1/3 × RSV（初始值50）
  - D = 2/3 × 昨日D + 1/3 × 今日K（初始值50）
  - J = 3K - 2D

  信号判定标准：

  1. **金叉识别**：
     - 使用 `get_daily_history`（30日）计算 KDJ(9,3,3)。
     - K 线从下方上穿 D 线（今日 K > D，昨日 K < D）。
     - 金叉位置越低，反弹动能越强。

  2. **超卖区间**（更强信号）：
     - J 值低于 20 时出现金叉：极强反弹信号。
     - J 值 20-50 时出现金叉：中等信号。
     - J 值 > 50 时金叉：弱信号，多为短暂反弹。

  3. **价格配合**（关联理念4：买点偏好）：
     - 当日收阳，最好收在均线支撑位上方。
     - 使用 `analyze_trend` 确认价格支撑位。

  4. **量能配合**（关联理念6：量价配合）：
     - 金叉日量能有所放大，volume_ratio > 1.1。
     - 缩量金叉可能是假信号，需谨慎。

  5. **背离增强**：
     - 价格创新低但 J 值未创新低（J 底背离）。
     - 背离确认后的金叉信号更可靠。

  评分调整：
  - J < 20 的低位金叉：sentiment_score +10
  - J 值 20-50 区间金叉：sentiment_score +6
  - J 底背离后金叉：额外 +5
  - 配合 RSI 同步超卖：额外 +3
  - 在 `buy_reason` 和 `pattern_analysis` 中注明"KDJ低位金叉"。
  - 止损设在金叉日低点，目标看 K、D 线到达 80 附近。
