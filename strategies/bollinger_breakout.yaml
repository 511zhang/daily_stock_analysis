# Bollinger Band Breakout Strategy / 布林带突破
# Price breaks above upper Bollinger Band with volume expansion.

name: bollinger_breakout
display_name: 布林带突破
description: 价格突破布林带上轨并伴随量能放大，趋势启动信号。布林带收窄后突破更为可靠。
category: trend
core_rules: [1, 3, 6]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [布林带突破, 布林突破, BBand突破]
default_priority: 35
market_regimes: [trending_up]

instructions: |
  **布林带突破（Bollinger Band Breakout Strategy）**

  计算方式（基于 get_daily_history 收盘价序列，20日周期，2倍标准差）：
  - 中轨（MB）= MA20
  - 标准差（σ）= 20日收盘价标准差
  - 上轨（UB）= MA20 + 2σ
  - 下轨（LB）= MA20 - 2σ
  - 带宽 = (UB - LB) / MB × 100%

  信号判定标准：

  1. **突破识别**（关联理念2：趋势交易）：
     - 使用 `get_daily_history`（30日）计算布林带。
     - 收盘价突破上轨（close > UB）。
     - 当日最高价突破但收盘回落至上轨下方，为假突破信号，不操作。

  2. **布林带收窄前提**（更高胜率）：
     - 突破前5-10日带宽 < 带宽20日均值的 70%（布林带收口）。
     - 收窄后放量突破是最强形态。

  3. **量能确认**（关联理念3：效率优先）：
     - 突破日成交量 > 5日均量的 1.5 倍。
     - `get_realtime_quote` → volume_ratio > 1.5。

  4. **价格位置**（关联理念1：严进策略）：
     - 价格不能已经大幅偏离上轨（突破当日乖离率 < 3%）。
     - 若收盘价距上轨 > 5%，视为追高，风险增大。

  5. **趋势背景**：
     - `analyze_trend` 确认 MA5 > MA10 > MA20 多头排列。
     - 布林带中轨向上斜率为正（趋势向上）。

  评分调整：
  - 布林带收口后放量突破上轨：sentiment_score +12
  - 普通放量突破上轨：sentiment_score +8
  - 量能不足但突破：sentiment_score +4（需等待确认）
  - 在 `buy_reason` 和 `volume_analysis` 中注明"布林带突破"。
  - 止损设在布林带中轨（MA20）处。
  - 目标位：中轨到上轨距离的 1-2 倍延伸。
