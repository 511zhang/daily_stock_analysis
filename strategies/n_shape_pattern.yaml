# N-Shape Pattern Strategy / N 字形态
# Price rises, pulls back without breaking prior low, then breaks to new high — classic continuation.

name: n_shape_pattern
display_name: N字形态
description: 股价创新高后回调不破前低，再次突破前高形成 N 字结构，强势趋势延续信号。
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [N字形态, N形走势, 回踩不破再创高]
default_priority: 40
market_regimes: [trending_up]

instructions: |
  **N 字形态（N-Shape Pattern Strategy）**

  形态结构（基于 get_daily_history）：
  - 第一段：上涨创阶段高点 A
  - 第二段：回调至低点 B（B > 前一个低点，不破支撑）
  - 第三段：再次上涨突破高点 A，形成新高

  信号判定标准：

  1. **第一段上涨确认**：
     - 使用 `get_daily_history`（30日）识别近期高点 A。
     - 上涨过程中量能放大，涨幅 > 5%。
     - `analyze_trend` 确认为上升趋势。

  2. **回调质量判断**（关联理念4：买点偏好）：
     - 回调至低点 B，B 不低于 A 前的最近支撑位。
     - 回调幅度通常在前段涨幅的 38%-61.8%（黄金分割）。
     - 回调期间量能萎缩（volume_ratio < 0.8），健康回踩。
     - 使用 `analyze_trend` → support_levels 确认支撑未破。

  3. **突破确认**（关联理念1：严进策略）：
     - 价格突破前高 A，当日收盘站上前高。
     - 突破时量能放大，volume_ratio > 1.3。
     - `get_realtime_quote` 实时确认突破有效性。

  4. **N 字节奏识别**：
     - 整个 N 字形态通常在 10-30 个交易日内完成。
     - 过短（< 5 日）可能是噪音，过长（> 60 日）动能衰减。

  5. **均线配合**（关联理念2）：
     - 回调过程中 MA5、MA10 保持多头排列或走平。
     - 均线不出现死叉是关键条件。

  评分调整：
  - 标准 N 字形态 + 缩量回踩 + 放量突破：sentiment_score +14
  - N 字突破前高 + 量能一般：sentiment_score +9
  - 回调过深（> 61.8%）但均线支撑住：sentiment_score +5（需谨慎）
  - 在 `pattern_analysis` 和 `buy_reason` 中注明"N字形态突破"。
  - 理想买点：突破前高时跟进，或回踩前高确认后介入。
  - 止损设在回调低点 B 下方。
