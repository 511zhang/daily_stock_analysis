# Volume Ratio Scan Strategy / 量比异动扫描
# Today's volume is significantly higher than the 5-day average — unusual activity signal.

name: volume_ratio_scan
display_name: 量比异动扫描
description: 当日量比异常放大，捕捉资金突然介入或异动信号。适合每日盘中扫描龙头候选。
category: trend
core_rules: [3, 6]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
aliases: [量比异动, 量比放大, 异常量比]
default_priority: 55
market_regimes: [trending_up, sideways]

instructions: |
  **量比异动扫描（Volume Ratio Scan Strategy）**

  量比定义：
  - 量比 = 当日成交量 / 过去5日平均成交量
  - 量比 > 1：今日活跃度高于平均
  - 量比 > 2：显著放量，值得关注
  - 量比 > 5：极端异动，可能有重大事件

  信号判定标准：

  1. **量比门槛筛选**：
     - 使用 `get_realtime_quote` → volume_ratio 直接获取。
     - 或用 `get_daily_history` 自行计算：今日量 / 前5日均量。
     - 初筛：volume_ratio ≥ 2.0。
     - 强信号：volume_ratio ≥ 3.0。

  2. **价格方向配合**（关联理念6：量价配合）：
     - 放量上涨（涨幅 > 2%）：量价配合，看多。
     - 放量横盘：可能是吸筹，需进一步观察。
     - 放量下跌：出货信号，不操作。

  3. **趋势背景**（关联理念2：趋势交易）：
     - `analyze_trend` 确认均线状态。
     - 上升趋势中量比异动：延续信号。
     - 底部盘整后量比异动：反转信号。

  4. **异动位置判断**：
     - 是否接近前期阻力位（`analyze_trend` → resistance_levels）？
     - 若在压力位附近放量上涨，可能是突破前兆。

  5. **排除干扰**（关联理念5：风险排查）：
     - 排查 `search_stock_news` 是否有除权除息、停复牌等技术性原因。
     - 排除量比因前期成交极地导致的"虚高"。

  评分调整：
  - volume_ratio ≥ 3.0 且放量上涨：sentiment_score +10
  - volume_ratio ≥ 2.0 且价格突破压力位：sentiment_score +8
  - volume_ratio ≥ 5.0 极端异动：额外 +3（同时提示关注风险）
  - 在 `volume_analysis` 和 `buy_reason` 中注明"量比异动"及具体数值。
