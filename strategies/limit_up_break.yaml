instructions: |
  **涨停炸板激进策略（Limit-Up Break - Aggressive）**

  本策略服务于满仓单票的激进短线交易者。
  核心目标：在热点概念的炸板票中，选出最强的一只，满仓出击。

  ## 一、选股三重过滤

  **第一层：概念过滤**
  - 只看百日新高排名前3的概念板块
  - 优先选排名第2-3的概念（刚被发现，空间更大）
  - 排名第1的概念如果已经连续领涨超过5天，回避

  **第二层：炸板性质判断（最关键）**

  1. 炸板位置：
     - 低位首板炸板（近20日涨幅<15%）→ 最佳，修复概率最高
     - 二板位置炸板 → 可以做，但要求其他条件更严格
     - 三板及以上炸板 → 直接淘汰

  2. 收盘价位置：
     - 收盘涨幅>7%（接近涨停）→ 强，洗盘概率大
     - 收盘涨幅5-7% → 中性，需要其他指标确认
     - 收盘涨幅<5% → 弱，大概率出货，淘汰

  3. 换手率：
     - 5-10% → 最佳区间
     - 10-15% → 可接受，但需要收盘价配合
     - >15% → 淘汰

  4. 尾盘表现：
     - 尾盘翘尾回升 → 加分
     - 尾盘持续走低 → 减分

  **第三层：从过滤后的票中选最强一只**
  排序标准（按权重）：
  - 题材地位：板块内第一个涨停的龙头 > 跟风（权重40%）
  - 收盘涨幅：越接近涨停越好（权重25%）
  - 换手率：5-8%最佳（权重20%）
  - 流通市值：30-150亿最佳（权重15%）

  ## 二、次日操作计划

  **买入条件（必须全部满足）：**
  1. 大盘上证指数跌幅<1%
  2. 所在概念板块今日不能大幅走弱
  3. 竞价低开2-5%且竞价量不是天量 → 准备低吸
  4. 开盘后10分钟内企稳不破昨日最低价 → 执行买入
  5. 高开3%以上且量比>2 → 可能走反包，可追

  **不买条件（任一满足就放弃）：**
  - 集合竞价低开超过5%
  - 开盘直接跌破昨日最低价
  - 大盘开盘跌超1%
  - 所在板块今日跌幅前列

  ## 三、持仓管理

  **止损铁律：**
  - 跌破昨日炸板最低价，立即止损
  - 买入后2个交易日内涨幅<3%，减仓或清仓

  **止盈：**
  - 第一目标：涨停板（+10%），封住就持有
  - 涨幅>7%但未封板，看量能决定
  - 尾盘回落到涨幅<3%，果断卖出

  ## 四、评分规则

  - 低位首板炸板 + 收盘涨幅>7%：+15
  - 板块龙头地位确认：+10
  - 题材为当前市场主线：+8
  - 尾盘翘尾回升：+5
  - 换手率5-10%：+5
  - 高位炸板（连板后）：-20（直接淘汰）
  - 收盘涨幅<5%：-15
  - 换手率>15%：-10
  - 板块今日走弱：-10

  最终信号：
  - 总分 >= 75：强烈建议买入，可满仓
  - 总分 60-74：建议买入，仓位70%
  - 总分 50-59：观望
  - 总分 < 50：回避

  在 buy_reason 中必须注明：炸板位置、炸板性质、次日操作计划（低吸价位/止损位/目标位）。
