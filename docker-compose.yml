# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
#
# 使用方式（从项目根目录执行）:
#   定时模式: docker compose up -d analyzer
#   FastAPI模式: docker compose up -d server
#   同时启动: docker compose up -d

name: daily-stock-analysis

x-common: &common
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./reports:/app/reports
    - ./.env:/app/.env
    - ./strategies:/app/strategies:ro
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  analyzer:
    <<: *common
    container_name: stock-analyzer

  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
